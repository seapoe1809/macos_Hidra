<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a152c" />
  <title>Darnahi · Bills</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/css/style.css?v=3" />
</head>
<body>
  <header class="bar">
    <h1><img class="logo" src="/assets/favicon.png" alt="" /><span class="txt">Darnahi · Bills</span></h1>
    <div class="right">
      <a class="btn secondary" href="/provider/">← Dashboard</a>
    </div>
  </header>

  <main class="wrap">

    <p class="step-hint" style="margin-bottom:1rem">
      <span class="step-badge">Pricing</span> Cost of goods +10% (best price available)
    </p>

    <!-- Add a bill -->
    <section>
      <h2>Add Bill</h2>
      <form id="bill-form">
        <label>Member npub</label>
        <input type="text" id="b-npub" placeholder="npub1…" required />

        <div class="row" style="margin-top:.4rem">
          <div><label>Amount (USD)</label><input type="text" id="b-amount" placeholder="0.00" required /></div>
          <div><label>Date</label><input type="date" id="b-date" required /></div>
        </div>

        <label style="margin-top:.6rem">Attach bill (PDF or photo) — optional</label>
        <input type="file" id="b-file" accept="application/pdf,image/*" />

        <button type="submit" id="b-submit" style="margin-top:.75rem">Add Bill</button>
        <p id="add-status" class="status"></p>
      </form>
    </section>

    <hr style="margin:1.75rem 0; border:none; border-top:1px solid #e6e6ef" />

    <!-- Search / list bills -->
    <section>
      <h2>Bills</h2>
      <div class="send-row">
        <input type="text" id="search-npub" placeholder="Search by npub…" />
        <button id="search-btn">Search</button>
        <button id="all-btn" class="secondary">Show all</button>
      </div>
      <p id="list-status" class="status"></p>
      <div id="bills-list"></div>
    </section>

  </main>

  <script src="/js/api.js?v=3"></script>
  <script src="/bills/bills.js?v=3"></script>
</body>
</html>
